server {
    listen 80;
    server_name demo.bagbily.com;

    # Redirect HTTP -> HTTPS (bật sau khi có SSL)
    # return 301 https://$host$request_uri;

    # Trả trang offline khi upstream lỗi
    proxy_intercept_errors on;
    error_page 500 502 503 504 /offline.html;

    # Serve offline page trực tiếp từ Nginx (không qua Node)
    # Đổi path này theo thư mục deploy thực tế trên VPS
    location = /offline.html {
        root /home/vibe-drama/public;
        internal;
    }

    # Cache static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3005;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Socket.io cho chat)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout cho long-polling
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
