<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Không có kết nối - Vibe Drama</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1.5rem;
        overflow: hidden;
        position: relative;
      }
      .glow {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          ellipse 600px 600px at 50% 40%,
          rgba(255, 69, 0, 0.08) 0%,
          transparent 70%
        );
      }
      svg {
        display: block;
        margin: 0 auto;
      }
      .icon-wrap {
        margin-bottom: 2rem;
        animation: pulse 2.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(0.95);
        }
      }
      h1 {
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        font-weight: 900;
        margin-bottom: 0.75rem;
        letter-spacing: -0.02em;
      }
      p {
        color: rgba(255, 255, 255, 0.5);
        font-size: clamp(0.875rem, 2.5vw, 1rem);
        max-width: 300px;
        line-height: 1.6;
        margin-bottom: 2.5rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #ff4500;
        color: #fff;
        font-weight: 700;
        font-size: 0.9375rem;
        padding: 0.75rem 2rem;
        border-radius: 9999px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        transition:
          opacity 0.15s,
          transform 0.15s;
        box-shadow: 0 0 24px rgba(255, 69, 0, 0.4);
      }
      .btn:hover {
        opacity: 0.9;
      }
      .btn:active {
        transform: scale(0.96);
      }
      .status {
        margin-top: 1.5rem;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.2);
        font-family: monospace;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>

    <!-- No-wifi icon -->
    <div class="icon-wrap">
      <svg
        width="80"
        height="80"
        viewBox="0 0 24 24"
        fill="none"
        stroke="rgba(255,69,0,0.9)"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <circle cx="12" cy="20" r="1" fill="rgba(255,69,0,0.9)" stroke="none" />
      </svg>
    </div>

    <h1>Mất kết nối mạng</h1>
    <p>Kiểm tra Wi-Fi hoặc dữ liệu di động của bạn, rồi thử lại.</p>

    <button class="btn" onclick="window.location.reload()">Thử lại</button>

    <p class="status" id="status"></p>

    <script>
      // Auto-reload when connection is restored
      window.addEventListener("online", () => {
        document.getElementById("status").textContent =
          "Đã có kết nối. Đang tải lại...";
        setTimeout(() => (window.location.href = "/"), 800);
      });
      window.addEventListener("offline", () => {
        document.getElementById("status").textContent = "Vẫn chưa có kết nối";
      });
    </script>
  </body>
</html>
